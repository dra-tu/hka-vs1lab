<!DOCTYPE html>

<!-- File origin: VS1LAB A1a -->

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoTagApp</title>
    <link rel="stylesheet" href="./stylesheets/style.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
    <header class="header">
        <img src="./images/location.png" class="header__image" alt="an image of a map and location">
        <h1 class="header__title">GeoTagApp</h1>
        <nav class="header__navigation">
            <a href="#">About</a> | <a href="#">Help</a> | <a href="/">Home</a>
        </nav>
    </header>

    <main class="main">
        <div class="row">
            
            <section class="main__tagging tagging col-4">
                <h2>Tagging</h2>
                <form id="tag-form" action="/tagging" method="post">
                    <fieldset>
                        <legend>Add a new GeoTag</legend>
                        <div class="form-group">
                            <label for="latitude">Latitude:</label>
                            <input type="number" id="latitude" name="latitude" min="-90" max="90" step="any" readonly placeholder="49.01379">  
                        </div>
                        <div class="form-group">
                            <label for="longtitude">Longtitude:</label>
                            <input type="number" id="longtitude" name="longtitude" min="-180" max="180" step="any" readonly placeholder="8.390071">  
                        </div>
                        <div class="form-group">
                            <label for="location-name">Name:</label>
                            <input type="text" id="location-name" name="location-name" required placeholder="e.g. Central Berlin" maxlength="10">
                        </div>
                        <div class="form-group">
                            <label for="hashtag">Hashtag:</label>
                            <input type="text" id="hashtag" name="hashtag" pattern="^#.*" placeholder="e.g. #ber" maxlength="11">
                        </div>
                        <button type="submit" class="btn-submit">Add Tag</button>
                    </fieldset>
                </form>
            </section>

            <section class="main__discovery discovery col-8">
                <h2 class="discovery__title">Discovery</h2>

                <div class="row">
                    <form class="discovery__search col-12" id="discoveryFilterForm" action="/discovery" method="post">
                        <fieldset>
                            <legend>Search</legend>
                            <div class="form-group">
                                <label for="search">Search term or keywords:</label>
                                <input type="text" id="search">
                            </div>
                            <button type="submit" class="btn-submit">Search</button>
                        </fieldset>
                    </form>
                </div>

                <div class="discovery__wrapper row">
                    <div class="discovery__taglist col-6">
                        <ul class="discovery__results" id="discoveryResults">
                            <li>Castle (49.01379, 8.404435) #sight</li>
                            <li>IWI (49.01379, 8.390071) #edu</li>
                        </ul>
                    </div>

                    <div id="map" class="discovery__map col-6">
                        <img src="./images/mapview.jpg" alt="a map with locations" id="mapView" />
                        <span>Result map</span>
                    </div>
                </div>
            </section>

        </div>

    </main>

    <footer class="footer">
        <span>(c) 2021/22 HKA_IWI_VSYS</span>
    </footer>
</body>

</html>

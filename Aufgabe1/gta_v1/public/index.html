<!DOCTYPE html>

<!-- File origin: VS1LAB A1a -->

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoTagApp</title>
    <link rel="stylesheet" href="./stylesheets/style.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
    <header class="header">
        <img src="./images/location.png" class="header__image" alt="an image of a map and location">
        <h1 class="header__titlechromium ./">GeoTagApp</h1>
        <nav class="header__navigation">
            <a href="#">About</a> | <a href="#">Help</a> | <a href="/">Home</a>
        </nav>
    </header>

    <main class="main">
        <section class="main__tagging tagging">
            <h2>Tagging</h2>
            <form id="tag-form" action="/tagging" method="post"></form>
                <fieldset>
                    <legend>Add a new GeoTag</legend>



                    <label>Latitude:</label>
                    <input id="latitude" type="number" step="any" min="-90" max="90" placeholder="40.67135" />
                    <label>Longitude:</label>
                    <input id="longitude" type="number" step="any" min="-180" max="180" placeholder="135.069" />
                    <label>Name:</label>
                    <input id="name" type="text" placeholder="e.g. Karlsruhe" /> <!--name-->
                    <label>Hashtag:</label>
                    <input id="hashtag" type="text" pattern="^#[^#][^ ]*$" placeholder="#HKA" /> <!--hashtag-->
                    <input id="submit_button" type="submit" value="Add Tag" />


                </fieldset>
            </form>

        </section>

        <section class="main__discovery discovery">
            <h2 class="discovery__title">Discovery</h2>

            <!-- ############### VS1Lab 1a Form 2 Start -->
            <form class="discovery__search" id="discoveryFilterForm" action="/discovery" method="post">

                <fieldset>
                    <legend>Search</legend>
                    <label>Search term or keywords:</label>
                    <input id="keyword_input" type="text" placeholder="e.g. Berlin"/>
                    <input type="submit" value="Search"/>

                </fieldset>

            </form>
            <!-- ############### VS1Lab 1a Form 2 End -->

            <div class="discovery__wrapper">
                <div class="discovery__taglist">
                    <ul class="discovery__results" id="discoveryResults">
                        <li>Castle (49.01379, 8.404435) #sight</li>
                        <li>IWI (49.01379, 8.390071) #edu</li>
                    </ul>
                </div>

                <div id="map" class="discovery__map">
                    <img src="./images/mapview.jpg" alt="a map with locations" id="mapView" />
                    <span>Result map</span>
                </div>
            </div>
        </section>

    </main>

    <footer class="footer">
        <span>(c) 2021/22 HKA_IWI_VSYS</span>
    </footer>
</body>

</html>

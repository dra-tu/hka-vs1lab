<!DOCTYPE html>

<!-- File origin: VS1LAB A1a -->

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoTagApp</title>
    <link rel="stylesheet" href="./stylesheets/style.css"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
<header class="header">
    <img src="./images/location.png" class="header__image" alt="an image of a map and location">
    <h1 class="header__title">GeoTagApp</h1>
    <nav class="header__navigation">
        <a href="#">About</a> | <a href="#">Help</a> | <a href="/">Home</a>
    </nav>
</header>

<main class="row main">
    <section class="col-4 main__tagging tagging">
        <h2>Tagging</h2>

        <!-- ############### VS1Lab 1a Form 1 Start -->
        <form id="tag-form" action="/tagging" method="post">
            <fieldset class="tagging__fieldset">
                <legend>Enter a Tag</legend>

                <label for="latitudeInputTagging">Latitude:</label>
                <input type="number" id="latitudeInputTagging" value="123" readonly>

                <label for="longitudeInputTagging">Longitude:</label>
                <input type="number" id="longitudeInputTagging" value="123" readonly>

                <label for="nameInputTagging">Name:</label>
                <input type="text" id="nameInputTagging" placeholder="Home" maxlength="10" required>

                <label for="hashtagInputTagging">Hashtag:</label>
                <input type="text" id="hashtagInputTagging" placeholder="#home" maxlength="11" pattern="#[A-Za-z]*">

            </fieldset>

            <button class="col-4" type="submit">Submit Tag</button>

            <!-- ... your code here ... -->

        </form>
        <!-- ############### VS1Lab 1a Form 1 End -->

    </section>

    <section class="col-6 main__discovery discovery">
        <h2 class="discovery__title">Discovery</h2>

        <!-- ############### VS1Lab 1a Form 2 Start -->
        <form class="discovery__search" id="discoveryFilterForm" action="/discovery" method="post">

            <fieldset class="row discovery__fieldset">

                <legend>Search for Tag</legend>

                <label for="searchtermInput">Search term:</label>
                <input type="text" id="searchtermInput" placeholder="Home">

                <label for="latitudeInputDiscovery"></label>
                <input type="hidden" id="latitudeInputDiscovery" value="0" readonly>

                <label for="longitudeInputDiscovery"></label>
                <input type="hidden" id="longitudeInputDiscovery" value="0" readonly>

            </fieldset>

            <button class="col-2" type="submit">Search</button>

            <!-- ... your code here ... -->

        </form>
        <!-- ############### VS1Lab 1a Form 2 End -->

        <div class="discovery__wrapper">
            <div class="discovery__taglist">
                <ul class="discovery__results" id="discoveryResults">
                    <li>Castle (49.01379, 8.404435) #sight</li>
                    <li>IWI (49.01379, 8.390071) #edu</li>
                </ul>
            </div>

            <div id="map" class="discovery__map">
                <img src="./images/mapview.jpg" alt="a map with locations" id="mapView"/>
                <span>Result map</span>
            </div>
        </div>
    </section>

</main>

<footer class="row footer">
    <span>(c) 2021/22 HKA_IWI_VSYS</span>
</footer>
</body>

</html>
